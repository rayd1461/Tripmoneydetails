<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>旅費管理系統 - 刪除功能版</title>
    <style>
        :root { --main-blue: #add8e6; --dark-blue: #007bff; --danger-red: #dc3545; }
        body { font-family: "Microsoft JhengHei", sans-serif; background-color: #f0f4f8; padding: 20px; line-height: 1.6; }
        
        .trip-container {
            border: 2px solid var(--main-blue);
            border-radius: 15px; background-color: #ffffff;
            padding: 20px; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .trip-header { 
            display: flex; justify-content: space-between; align-items: center;
            cursor: pointer; border-bottom: 1px solid #eee; padding-bottom: 10px;
        }

        .budget-control { margin: 10px 0; background: #f9f9f9; padding: 10px; border-radius: 8px; }
        .budget-control input { padding: 5px; width: 120px; }
        .locked-msg { color: #d9534f; font-size: 0.8em; margin-left: 10px; display: none; }

        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        th { background-color: #e3f2fd; }

        .btn { padding: 8px 15px; cursor: pointer; border-radius: 5px; border: none; transition: 0.2s; }
        .btn-main { background-color: var(--dark-blue); color: white; margin-bottom: 20px; }
        .btn-add { background-color: #28a745; color: white; margin-top: 10px; }
        .btn-end { background-color: #6c757d; color: white; float: right; margin-top: 15px; }
        .btn-del { background-color: var(--danger-red); color: white; padding: 4px 8px; font-size: 12px; }
        
        .collapsed { display: none; }
        
        .modal { display: none; position: fixed; z-index: 10; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); }
        .modal-content { background: white; margin: 10% auto; padding: 25px; border-radius: 10px; width: 450px; }
        
        .summary-box { margin-top:10px; font-weight:bold; color:var(--danger-red); text-align:right; border-top: 1px dashed #ccc; padding-top: 10px; }
    </style>
</head>
<body>

    <h1>🌍 旅程開支管理系統</h1>
    <button class="btn btn-main" onclick="openModal('tripModal')">＋ 新增旅程</button>

    <div id="trip-list"></div>

    <div id="tripModal" class="modal">
        <div class="modal-content">
            <h3>登記新旅程</h3>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                <div><label>目的地</label><input type="text" id="dest" style="width:100%"></div>
                <div><label>預計旅費(TWD)</label><input type="number" id="budget" style="width:100%"></div>
                <div><label>出發日期</label><input type="date" id="start"></div>
                <div><label>歸來日期</label><input type="date" id="end"></div>
            </div>
            <br>
            <button class="btn btn-add" onclick="saveTrip()">建立旅程</button>
            <button class="btn" onclick="closeModal('tripModal')">取消</button>
        </div>
    </div>

    <div id="itemModal" class="modal">
        <div class="modal-content">
            <h3>新增支出</h3>
            <label>分類</label>
            <select id="itemTag" style="width:100%; margin-bottom:10px;">
                <option>交通</option><option>三餐</option><option>飯店</option>
                <option>服裝</option><option>便利商店</option><option>其他</option>
            </select>
            <label>明細內容</label><input type="text" id="itemName" style="width:100%; margin-bottom:10px;">
            <label>外幣金額</label><input type="number" id="fAmt" style="width:100%" oninput="updateTwd()">
            <label>當前匯率</label><input type="number" id="rate" step="0.01" style="width:100%" oninput="updateTwd()">
            <p>折合台幣：<span id="twdDisplay">0</span></p>
            <button class="btn btn-add" onclick="confirmItem()">確認加入</button>
            <button class="btn" onclick="closeModal('itemModal')">取消</button>
        </div>
    </div>

    <script>
        let trips = JSON.parse(localStorage.getItem('trips')) || [];
        let activeTripId = null;

        window.onload = renderTrips;

        function openModal(id) { document.getElementById(id).style.display = 'block'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }

        function updateTwd() {
            const f = document.getElementById('fAmt').value;
            const r = document.getElementById('rate').value;
            document.getElementById('twdDisplay').innerText = Math.round(f * r);
        }

        function saveTrip() {
            const trip = {
                id: Date.now(),
                dest: document.getElementById('dest').value || "未命名旅程",
                budget: parseFloat(document.getElementById('budget').value) || 0,
                start: document.getElementById('start').value,
                end: document.getElementById('end').value,
                items: [],
                isEnded: false
            };
            trips.push(trip);
            localStorage.setItem('trips', JSON.stringify(trips));
            renderTrips();
            closeModal('tripModal');
        }

        function renderTrips() {
            const list = document.getElementById('trip-list');
            list.innerHTML = '';
            const now = new Date();

            trips.forEach(trip => {
                const startDate = new Date(trip.start + "T00:00:00");
                const isLocked = now >= startDate;

                const container = document.createElement('div');
                container.className = 'trip-container';
                container.innerHTML = `
                    <div class="trip-header" onclick="toggleCollapse(${trip.id})">
                        <div>
                            <strong>📍 ${trip.dest}</strong> 
                            <small>(${trip.start} ~ ${trip.end})</small>
                        </div>
                        <span>${trip.isEnded ? '✅ 已結束 (點擊展開)' : '✈️ 進行中'}</span>
                    </div>
                    
                    <div id="content-${trip.id}" class="${trip.isEnded ? 'collapsed' : ''}">
                        <div class="budget-control">
                            預計旅費：<input type="number" value="${trip.budget}" 
                                ${isLocked ? 'disabled' : ''} 
                                onchange="updateBudget(${trip.id}, this.value)"> TWD
                            ${isLocked ? '<span class="locked-msg" style="display:inline">🔒 預算已鎖定</span>' : ''}
                        </div>
                        
                        <table>
                            <thead><tr><th>標籤</th><th>內容</th><th>外幣</th><th>匯率</th><th>台幣</th><th>操作</th></tr></thead>
                            <tbody>
                                ${trip.items.map((item, index) => `
                                    <tr>
                                        <td>${item.tag}</td>
                                        <td>${item.name}</td>
                                        <td>${item.fAmt}</td>
                                        <td>${item.rate}</td>
                                        <td>${item.tAmt}</td>
                                        <td>
                                            ${!trip.isEnded ? `<button class="btn btn-del" onclick="deleteItem(${trip.id}, ${index})">刪除</button>` : '-'}
                                        </td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>

                        ${!trip.isEnded ? `
                            <button class="btn btn-add" onclick="event.stopPropagation(); openItemModal(${trip.id})">＋ 增加細項</button>
                            <button class="btn btn-end" onclick="event.stopPropagation(); endTrip(${trip.id})">結束旅程</button>
                        ` : `
                            <div class="summary-box">總結算金額：NT$ ${calculateTotal(trip.id)}</div>
                        `}
                    </div>
                `;
                list.appendChild(container);
            });
        }

        function updateBudget(id, val) {
            const trip = trips.find(t => t.id === id);
            trip.budget = parseFloat(val);
            localStorage.setItem('trips', JSON.stringify(trips));
        }

        function deleteItem(tripId, itemIndex) {
            if(confirm("確定要刪除這筆支出嗎？")) {
                const trip = trips.find(t => t.id === tripId);
                trip.items.splice(itemIndex, 1); // 移除該索引的項目
                localStorage.setItem('trips', JSON.stringify(trips));
                renderTrips();
            }
        }

        function toggleCollapse(id) {
            document.getElementById(`content-${id}`).classList.toggle('collapsed');
        }

        function openItemModal(id) {
            activeTripId = id;
            document.getElementById('fAmt').value = '';
            document.getElementById('rate').value = '';
            document.getElementById('itemName').value = '';
            document.getElementById('twdDisplay').innerText = '0';
            openModal('itemModal');
        }

        function confirmItem() {
            const trip = trips.find(t => t.id === activeTripId);
            const f = document.getElementById('fAmt').value;
            const r = document.getElementById('rate').value;
            
            if(!f || !r) return alert("請填寫完整金額與匯率");

            const item = {
                tag: document.getElementById('itemTag').value,
                name: document.getElementById('itemName').value || "未命名支出",
                fAmt: f,
                rate: r,
                tAmt: Math.round(f * r)
            };
            trip.items.push(item);
            localStorage.setItem('trips', JSON.stringify(trips));
            renderTrips();
            closeModal('itemModal');
        }

        function calculateTotal(id) {
            const trip = trips.find(t => t.id === id);
            return trip.items.reduce((sum, item) => sum + item.tAmt, 0);
        }

        function endTrip(id) {
            if(confirm("確定結束旅程嗎？結算後支出明細將無法再刪除或修改。")) {
                const trip = trips.find(t => t.id === id);
                trip.isEnded = true;
                localStorage.setItem('trips', JSON.stringify(trips));
                renderTrips();
            }
        }
    </script>
</body>
</html>
